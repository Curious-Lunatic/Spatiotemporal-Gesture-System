<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Engine | Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --bg-base: #000000; --bg-elevated: #121212; --bg-card: #181818; --bg-hover: #282828; --text-primary: #FFFFFF; --text-secondary: #B3B3B3; --font-ui: 'Inter', sans-serif; --font-code: 'JetBrains Mono', monospace; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-ui); background-color: var(--bg-base); color: var(--text-primary); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 4px; }
        .subtitle { color: var(--text-secondary); font-family: var(--font-code); font-size: 0.9rem; letter-spacing: 2px; }
        .controls { display: flex; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
        button { font-family: var(--font-code); font-weight: 700; font-size: 0.85rem; background-color: var(--text-primary); color: var(--bg-base); border: none; border-radius: 50px; padding: 12px 28px; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; }
        button:hover:not(:disabled) { transform: scale(1.04); background-color: #f0f0f0; }
        button:disabled { background-color: var(--bg-hover); color: #555; cursor: not-allowed; }
        #connectBtn { background-color: transparent; color: var(--text-primary); border: 1px solid var(--text-secondary); }
        #statusText { margin-bottom: 1.5rem; font-family: var(--font-code); font-size: 1.1rem; text-align: center; min-height: 24px; }
        
        #three-container { width: 100%; max-width: 1200px; height: 350px; background-color: var(--bg-elevated); border-radius: 12px; margin-bottom: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; width: 100%; max-width: 1200px; }
        .chart-card { background-color: var(--bg-elevated); padding: 16px; border-radius: 12px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 24px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
        .chart-title { font-family: var(--font-code); color: var(--text-secondary); margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 1px; }
        canvas { width: 100% !important; height: 150px !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Auth Engine</h1>
        <div class="subtitle">Spatio-Temporal Fusion // 12-DOF 3D Tracking</div>
    </div>

    <div class="controls">
        <button id="connectBtn">Connect Device</button>
        <button id="recordTemplateBtn" disabled>Record Pattern</button>
        <button id="testGestureBtn" disabled>Test Access</button>
    </div>

    <div id="statusText" style="color: var(--text-secondary);">AWAITING CONNECTION...</div>

    <div id="three-container"></div>

    <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">HAND (BASE)</div><canvas id="handChart"></canvas></div>
        <div class="chart-card"><div class="chart-title">INDEX FINGER</div><canvas id="indexChart"></canvas></div>
        <div class="chart-card"><div class="chart-title">MIDDLE FINGER</div><canvas id="middleChart"></canvas></div>
        <div class="chart-card"><div class="chart-title">THUMB</div><canvas id="thumbChart"></canvas></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
