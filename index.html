<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Engine Tracker & DTW Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { margin-bottom: 5px; }
        .controls { 
            margin-bottom: 20px; 
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #9965f4; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .chart-container {
            width: 90%;
            max-width: 900px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        #statusText {
            margin-top: 15px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>Spatio-Temporal Auth Engine</h1>
    <p>Live MPU6050 DTW Processing</p>

<div class="controls">
        <button id="connectBtn">Connect to ESP32</button>
        <button id="recordTemplateBtn" disabled>1. Record Password</button>
        <button id="testGestureBtn" disabled>2. Test Login</button>
    </div>
    
    <div style="display: flex; gap: 20px; margin: 15px 0; background: #1e1e1e; padding: 15px; border-radius: 8px;">
        <div><strong>Zone 1 (US1):</strong> <span id="us1Label">Waiting...</span></div>
        <div><strong>Zone 2 (US2):</strong> <span id="us2Label">Waiting...</span></div>
        <div><strong>IR 1:</strong> <span id="ir1Label">Waiting...</span></div>
        <div><strong>IR 2:</strong> <span id="ir2Label">Waiting...</span></div>
    </div>

    <div id="statusText" style="color: #bb86fc; font-weight: bold; font-size: 1.2rem;">Status: Waiting to connect...</div>

    <div class="chart-container">
        <canvas id="imuChart"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
